<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HST Team Member App</title>
  <style>
    :root {
      --primary: #2563eb;
      --bg-light: #f3f4f6;
      --text-dark: #1f2937;
      --card-bg: #ffffff;
      --error: #dc2626;
      --success: #16a34a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-light); color: var(--text-dark); padding: 10px; max-width: 480px; margin: 0 auto; }
    .hidden { display: none !important; }
    .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; }
    h2 { margin-bottom: 15px; font-size: 1.3rem; text-align: center; color: var(--primary); }
    .logo-container { text-align: center; margin-bottom: 12px; }
    .logo-container img { max-width: 160px; height: auto; display: block; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
    
    /* Fixed Password Wrapper */
    .password-wrapper { position: relative; display: block; width: 100%; }
    .password-wrapper input { padding-right: 45px; -webkit-text-security: disc; text-security: disc; width: 100%; }
    .password-wrapper input.visible { -webkit-text-security: none; text-security: none; }
    .toggle-eye { 
      position: absolute; 
      right: 10px; 
      top: 50%; 
      transform: translateY(-50%); 
      background: transparent; 
      border: none; 
      cursor: pointer; 
      padding: 5px; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      z-index: 10;
      width: auto;
    }
    .toggle-eye svg { width: 20px; height: 20px; fill: #6b7280; pointer-events: none; }

    button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    button:active { background: #1d4ed8; }
    .btn-secondary { background: #6b7280; margin-top: 8px; }
    .btn-secondary:active { background: #4b5563; }
    .btn-link { background: none; color: var(--primary); border: none; text-decoration: underline; font-size: 0.85rem; padding: 4px; cursor: pointer; text-align: center; width: 100%; margin-top: 6px; }
    .toast { padding: 12px; border-radius: 8px; color: white; text-align: center; margin-bottom: 15px; font-weight: 500; font-size: 0.95rem; }
    .toast-error { background: var(--error); }
    .toast-success { background: var(--success); }
    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .item-row { border-bottom: 1px solid #e5e7eb; padding: 10px 0; font-size: 0.9rem; }
    .flex-space { display: flex; justify-content: space-between; margin-bottom: 4px; }
  </style>
</head>
<body>

  <div id="toast-container" class="hidden"></div>

  <!-- VIEW 1: AUTHENTICATION CONTAINER -->
  <div id="view-login" class="card">
    <div class="logo-container">
      <img src="onehr%20logo.png" alt="OneHR Logo" onerror="this.src='onehr logo.png';">
    </div>
    <h2>Login for HST Team Members</h2>
    <div class="form-group">
      <label>Employee Code</label>
      <input type="text" id="login-emp-code" placeholder="Enter Emp Code">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input type="text" id="login-password" maxlength="6" placeholder="Enter 6-digit Password">
        <button type="button" class="toggle-eye" onclick="togglePasswordVisibility('login-password')">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>
    </div>
    <button onclick="executeLogin()">Login</button>
    <button type="button" class="btn-link" onclick="switchView('view-change-password')">Change Password</button>
  </div>

  <!-- VIEW 1B: CHANGE PASSWORD CONTAINER -->
  <div id="view-change-password" class="hidden card">
    <h2>Change Password</h2>
    <div class="form-group">
      <label>Employee Code</label>
      <input type="text" id="change-emp-code" placeholder="Enter Emp Code" onblur="updateRegisteredEmailHint()">
    </div>
    <div class="form-group">
      <label>Current Password</label>
      <div class="password-wrapper">
        <input type="text" id="change-curr-pass" maxlength="6" placeholder="Current Password">
        <button type="button" class="toggle-eye" onclick="togglePasswordVisibility('change-curr-pass')">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label>New Password (Max 6 Chars)</label>
      <div class="password-wrapper">
        <input type="text" id="change-new-pass" maxlength="6" placeholder="New Password">
        <button type="button" class="toggle-eye" onclick="togglePasswordVisibility('change-new-pass')">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <div class="password-wrapper">
        <input type="text" id="change-conf-pass" maxlength="6" placeholder="Confirm New Password">
        <button type="button" class="toggle-eye" onclick="togglePasswordVisibility('change-conf-pass')">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>
    </div>
    <button onclick="executeChangePassword()">Submit New Password</button>
    <button type="button" onclick="executeResetPassword()" class="btn-secondary">Reset Password</button>

    <!-- Guiding Sentence with Dynamic Email Placeholder -->
    <p style="font-size: 0.82rem; color: #4b5563; text-align: center; margin-top: 10px; line-height: 1.4;">
      You will receive a new password in your registered email 
      <strong id="display-user-email" style="color: var(--primary);">(enter Emp Code above)</strong> 
      after you click on <strong>Reset Password</strong>.
    </p>

    <button type="button" onclick="switchView('view-login')" class="btn-link">Back to Login</button>
  </div>

  <!-- VIEW 2: OPERATIONAL DASHBOARD -->
  <div id="view-dashboard" class="hidden">
    <div class="nav-header">
      <div>
        <h4 id="dash-user-name">Welcome User</h4>
        <small id="dash-user-code" style="color:#6b7280;"></small>
      </div>
      <button onclick="executeLogout()" style="width:auto; padding: 6px 12px; font-size:0.85rem;" class="btn-secondary">Logout</button>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom: 12px; font-size: 1.1rem;">Quick Actions</h3>
      <button onclick="switchView('view-work-entry')">Daily Work Entry</button>
      <button onclick="loadTimesheetHistory()" class="btn-secondary">My Timesheet History</button>
    </div>
  </div>

  <!-- VIEW 3: DAILY WORK ENTRY FORM -->
  <div id="view-work-entry" class="hidden card">
    <h2>Daily Work Entry</h2>
    <form id="work-form" onsubmit="executeWorkSubmit(event)">
      <div class="form-group">
        <label>Work Date</label>
        <input type="date" id="work-date" required>
      </div>
      <div class="form-group">
        <label>From Time</label>
        <input type="time" id="work-from" required>
      </div>
      <div class="form-group">
        <label>To Time</label>
        <input type="time" id="work-to" required>
      </div>
      <div class="form-group">
        <label>Project Matrix</label>
        <select id="work-project" required>
          <option value="">-- Choose Project --</option>
        </select>
      </div>
      <div class="form-group">
        <label>Activity Summary (Max 500 characters)</label>
        <textarea id="work-desc" rows="4" maxlength="500" placeholder="Describe the structural work accomplished..." required></textarea>
      </div>
      <button type="submit" id="btn-save-log">Submit Work Log</button>
      <button type="button" onclick="switchView('view-dashboard')" class="btn-secondary">Cancel</button>
    </form>
  </div>

  <!-- VIEW 4: USER TIMESHEET VIEW -->
  <div id="view-timesheet" class="hidden card">
    <h2>My Log History</h2>
    <div id="timesheet-list" style="margin-bottom: 15px; max-height: 350px; overflow-y: auto;"></div>
    <button onclick="switchView('view-dashboard')" class="btn-secondary">Return to Dashboard</button>
  </div>

  <script>
    const BACKEND_API = "https://script.google.com/macros/s/AKfycbxX86VBRJfbDfPk2_HFFCpLv6fMn7To7GX_WgQWmvd7m2_bgr2cXa7nsgc92VdxxmMXCA/exec";

    let currentUser = null;

    // Core function to make API requests to Apps Script
    async function callBackend(action, payload) {
      const response = await fetch(BACKEND_API, {
        method: "POST",
        body: JSON.stringify({ action, payload })
      });
      const result = await response.json();
      if (!result.success) throw new Error(result.error);
      return result.data;
    }

    function showToast(msg, isError = true) {
      const container = document.getElementById('toast-container');
      container.className = `toast ${isError ? 'toast-error' : 'toast-success'}`;
      container.innerText = msg;
      container.classList.remove('hidden');
      window.scrollTo(0, 0);
      setTimeout(() => container.classList.add('hidden'), 4000);
    }

    function switchView(viewId) {
      if (viewId === 'view-change-password') {
        const loginCode = document.getElementById('login-emp-code').value.trim();
        if (loginCode) {
          document.getElementById('change-emp-code').value = loginCode;
          updateRegisteredEmailHint(); // Fetch registered email immediately
        }
      }

      if (viewId === 'view-login') {
        const changeCode = document.getElementById('change-emp-code').value.trim();
        if (changeCode) {
          document.getElementById('login-emp-code').value = changeCode;
        }
      }

      ['view-login', 'view-change-password', 'view-dashboard', 'view-work-entry', 'view-timesheet'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
      });
      document.getElementById(viewId).classList.remove('hidden');
    }

    function togglePasswordVisibility(inputId) {
      const input = document.getElementById(inputId);
      input.classList.toggle('visible');
    }

    async function updateRegisteredEmailHint() {
      const empCode = document.getElementById('change-emp-code').value.trim();
      const emailDisplay = document.getElementById('display-user-email');

      if (!empCode) {
        if (emailDisplay) emailDisplay.innerText = "(enter Emp Code above)";
        return;
      }

      if (emailDisplay) emailDisplay.innerText = "(checking email...)";

      try {
        const res = await callBackend("getRegisteredEmail", { empCode });
        if (res && res.email) {
          if (emailDisplay) emailDisplay.innerText = `(${res.email})`;
        } else {
          if (emailDisplay) emailDisplay.innerText = "(email not found)";
        }
      } catch (err) {
        if (emailDisplay) emailDisplay.innerText = "(email not found)";
      }
    }

    async function executeLogin() {
      const empCode = document.getElementById('login-emp-code').value.trim();
      const password = document.getElementById('login-password').value;
      if(!empCode || !password) return showToast("Please input credentials explicitly.");

      try {
        currentUser = await callBackend("login", { empCode, password });
        document.getElementById('dash-user-name').innerText = currentUser.employee_name;
        document.getElementById('dash-user-code').innerText = `ID: ${currentUser.emp_code}`;
        
        const metaData = await callBackend("getAppMeta", {});
        const config = metaData.config || { edit_window_days: 3 };
        const projects = metaData.projects || [];

        const dateInput = document.getElementById('work-date');
        const today = new Date();
        dateInput.max = today.toISOString().split('T')[0];
        
        const minPast = new Date();
        const fallbackDays = parseInt(config.edit_window_days) || 3;
        minPast.setDate(today.getDate() - fallbackDays);
        dateInput.min = minPast.toISOString().split('T')[0];

        const dropdown = document.getElementById('work-project');
        dropdown.innerHTML = '<option value="">-- Choose Project --</option>';
        projects.forEach(p => {
          dropdown.innerHTML += `<option value="${p.project_id}">${p.project_name}</option>`;
        });

        switchView('view-dashboard');
      } catch(e) {
        showToast(e.message);
      }
    }

    async function executeChangePassword() {
      const empCode = document.getElementById('change-emp-code').value.trim();
      const currentPassword = document.getElementById('change-curr-pass').value;
      const newPassword = document.getElementById('change-new-pass').value;
      const confPassword = document.getElementById('change-conf-pass').value;

      if (!empCode || !currentPassword || !newPassword || !confPassword) {
        return showToast("All password fields are required.");
      }
      if (newPassword !== confPassword) {
        return showToast("New Password and Confirm Password do not match.");
      }
      if (newPassword.length > 6) {
        return showToast("Password cannot exceed 6 characters.");
      }

      try {
        const msg = await callBackend("changePassword", { empCode, currentPassword, newPassword });
        showToast(msg, false);
        switchView('view-login');
      } catch(e) {
        showToast(e.message);
      }
    }

    async function executeResetPassword() {
      const empCode = document.getElementById('change-emp-code').value.trim() || document.getElementById('login-emp-code').value.trim();
      if (!empCode) return showToast("Please enter Employee Code to reset password.");

      try {
        const msg = await callBackend("resetPassword", { empCode });
        showToast(msg, false);
        switchView('view-login');
      } catch(e) {
        showToast(e.message);
      }
    }

    function validateTimeInputs() {
      const fromTime = document.getElementById('work-from').value;
      const toTime = document.getElementById('work-to').value;
      
      if (fromTime && toTime) {
        if (toTime <= fromTime) {
          showToast("End Time must be later than Start Time.");
          document.getElementById('work-to').value = "";
          return false;
        }
      }
      return true;
    }

    document.getElementById('work-from').addEventListener('change', validateTimeInputs);
    document.getElementById('work-to').addEventListener('change', validateTimeInputs);

    async function executeWorkSubmit(e) {
      e.preventDefault();
      if (!validateTimeInputs()) return;

      const btn = document.getElementById('btn-save-log');
      btn.disabled = true;

      const pSelect = document.getElementById('work-project');
      const payload = {
        employee_uid: currentUser.employee_uid,
        work_date: document.getElementById('work-date').value,
        from_time: document.getElementById('work-from').value,
        to_time: document.getElementById('work-to').value,
        project_id: pSelect.value,
        project_name: pSelect.options[pSelect.selectedIndex].text,
        work_description: document.getElementById('work-desc').value.trim()
      };

      try {
        await callBackend("submitWorkLog", payload);
        showToast("Work entry saved successfully.", false);
        document.getElementById('work-form').reset();
        switchView('view-dashboard');
      } catch(err) {
        showToast(err.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function loadTimesheetHistory() {
      try {
        const records = await callBackend("getTimesheet", { employee_uid: currentUser.employee_uid });
        const listContainer = document.getElementById('timesheet-list');
        listContainer.innerHTML = records.length === 0 ? '<p style="text-align:center;color:#6b7280;">No entries cataloged.</p>' : '';
        
        records.forEach(r => {
          listContainer.innerHTML += `
            <div class="item-row">
              <div class="flex-space"><strong>${r.work_date}</strong><span>${r.duration} hrs</span></div>
              <div class="flex-space"><span style="color:var(--primary); font-weight:500;">${r.project_name}</span><small style="color:#9ca3af;">${r.from_time} - ${r.to_time}</small></div>
              <p style="color:#4b5563; font-size:0.85rem; margin-top:2px;">${r.work_description}</p>
            </div>`;
        });
        switchView('view-timesheet');
      } catch(e) {
        showToast(e.message);
      }
    }

    function executeLogout() {
      currentUser = null;
      document.getElementById('login-password').value = "";
      switchView('view-login');
    }
  </script>
</body>
</html>
