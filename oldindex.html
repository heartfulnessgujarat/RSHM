<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Work Reporting</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#f4f5f7;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

}

.login-card{

    width:360px;
    background:white;

    border-radius:18px;

    padding:30px;

    box-shadow:0 8px 25px rgba(0,0,0,.10);

}

.logo{

    text-align:center;
    margin-bottom:20px;

}

.logo img{

    width:130px;

}

.title{

    text-align:center;

    font-size:28px;

    font-weight:bold;

    color:#5e001f;

    margin-bottom:30px;

}

.label{

    font-size:14px;

    margin-bottom:8px;

    color:#555;

}

.input{

    width:100%;

    height:48px;

    border:1px solid #d6d6d6;

    border-radius:10px;

    padding:12px;

    margin-bottom:18px;

    font-size:15px;

}

.password-box{

    position:relative;

}

.eye{

    position:absolute;

    right:15px;

    top:15px;

    cursor:pointer;

    color:#666;

}

.login-btn{

    width:100%;

    height:48px;

    background:#7b1436;

    color:white;

    border:none;

    border-radius:10px;

    font-size:17px;

    cursor:pointer;

    margin-top:8px;

}

.login-btn:hover{

    background:#5d0f28;

}

.forgot{

    text-align:center;

    margin-top:20px;

}

.forgot a{

    color:#7b1436;

    text-decoration:none;

    font-size:14px;

}

.forgot a:hover{

    text-decoration:underline;

}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">

<!-- Replace this image later with official OneHR logo -->
 <img src="assets/images/onehr-logo.png">


</div>

<div class="title">

Daily Work Reporting

</div>

<div class="label">

Employee Code

</div>

<input
type="text"
id="emp_code"
class="input"
placeholder="Enter your Employee Code">

<div class="label">

Password

</div>

<div class="password-box">

<input
type="password"
id="password"
class="input"
maxlength="6"
placeholder="Enter password">

<span class="eye">

👁

</span>

</div>

    <button
class="login-btn"

onclick="login(
document.getElementById('emp_code').value.trim().toUpperCase(),
document.getElementById('password').value
);" >

Login

</button>

    
<div class="forgot">

<a href="#">

Forgot Password?

</a>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>

</html>
